# mesh.clab.yml
#
# Topologia "mesh" del progetto Event-Driven Simulator.
# Riproduce NetworkTopology.mesh() (rows=2, cols=3): griglia 2x3 con link
# bidirezionali, ognuno da 10 Mbps (sim: capacity=10).
#
#   n00 ── n01 ── n02
#    │      │      │
#   n10 ── n11 ── n12
#
# Indirizzi, routing e shaping sono applicati da ../deploy.sh.
name: mesh

topology:
  defaults:
    kind: linux
  kinds:
    linux:
      image: ghcr.io/srl-labs/network-multitool:latest
  nodes:
    n00: {}
    n01: {}
    n02: {}
    n10: {}
    n11: {}
    n12: {}
  links:
    # link orizzontali - riga 0
    - endpoints: ["n00:eth1", "n01:eth1"]
    - endpoints: ["n01:eth2", "n02:eth1"]
    # link orizzontali - riga 1
    - endpoints: ["n10:eth1", "n11:eth1"]
    - endpoints: ["n11:eth2", "n12:eth1"]
    # link verticali
    - endpoints: ["n00:eth2", "n10:eth2"]
    - endpoints: ["n01:eth3", "n11:eth3"]
    - endpoints: ["n02:eth2", "n12:eth2"]
